<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日TODO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0d0d12;
            --card: #16161e;
            --card-hover: #1e1e28;
            --border: #2a2a36;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --success: #10b981;
            --life: #ec4899;
            --work: #3b82f6;
            --study: #8b5cf6;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }
        
        .date {
            color: var(--text-dim);
            font-size: 0.875rem;
        }
        
        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--card);
            padding: 16px 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        
        /* 输入区域 */
        .input-section {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus {
            border-color: var(--accent);
        }
        
        input[type="text"]::placeholder {
            color: var(--text-dim);
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .btn:hover {
            background: var(--accent-hover);
        }
        
        .btn-secondary {
            background: var(--card);
            color: var(--text-dim);
            font-size: 0.8rem;
            padding: 8px 14px;
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: var(--card-hover);
            color: var(--text);
        }
        
        .options-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .option-label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        
        select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
        }
        
        /* 标签筛选 */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--card);
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        
        .tab:hover, .tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        
        /* TODO列表 */
        .todo-list {
            list-style: none;
        }
        
        .todo-group {
            margin-bottom: 20px;
        }
        
        .group-title {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-left: 4px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .todo-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: var(--card);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.15s;
            border: 1px solid var(--border);
        }
        
        .todo-item:hover {
            background: var(--card-hover);
        }
        
        .todo-item.completed {
            opacity: 0.4;
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-dim);
        }
        
        .todo-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
            appearance: none;
            border: 2px solid var(--text-dim);
            border-radius: 4px;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        
        .todo-checkbox:checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .todo-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
        }
        
        .todo-content {
            flex: 1;
            min-width: 0;
        }
        
        .todo-text {
            font-size: 0.9rem;
            word-break: break-word;
        }
        
        .todo-meta {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        
        .tag {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .tag.life { background: rgba(236, 72, 153, 0.15); color: var(--life); }
        .tag.work { background: rgba(59, 130, 246, 0.15); color: var(--work); }
        .tag.study { background: rgba(139, 92, 246, 0.15); color: var(--study); }
        
        .priority-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .priority-badge.high { background: rgba(244, 63, 94, 0.15); color: var(--danger); }
        .priority-badge.medium { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .priority-badge.low { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        
        .delete-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0;
            transition: all 0.2s;
            margin-left: 8px;
        }
        
        .todo-item:hover .delete-btn {
            opacity: 1;
        }
        
        .delete-btn:hover {
            background: rgba(244, 63, 94, 0.15);
            color: var(--danger);
        }
        
        .edit-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0;
            transition: all 0.2s;
        }
        
        .todo-item:hover .edit-btn {
            opacity: 1;
        }
        
        .edit-btn:hover {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent);
        }
        
        .edit-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--accent);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
        }
        
        /* 导出按钮 */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 48px 20px;
            font-size: 0.9rem;
        }
        
        /* 快捷键提示 */
        .shortcuts {
            text-align: center;
            margin-top: 24px;
            color: var(--text-dim);
            font-size: 0.75rem;
        }
        
        .kbd {
            background: var(--card);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid var(--border);
        }
        
        @media (max-width: 540px) {
            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
            .input-row {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .options-row {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐕 今日TODO</h1>
            <div class="date" id="currentDate"></div>
        </header>
        
        <!-- 统计面板 -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completionRate">0%</div>
                <div class="stat-label">完成率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streakDays">0</div>
                <div class="stat-label">连续天数</div>
            </div>
        </div>
        
        <!-- 输入区域 -->
        <div class="input-section">
            <div class="input-row">
                <input type="text" id="todoInput" placeholder="添加新任务..." onkeypress="handleKeyPress(event)">
                <button class="btn" onclick="addTodo()">添加</button>
            </div>
            <div class="options-row">
                <div class="option-group">
                    <span class="option-label">分类</span>
                    <select id="categorySelect">
                        <option value="life">生活</option>
                        <option value="work">工作</option>
                        <option value="study">学习</option>
                    </select>
                </div>
                <div class="option-group">
                    <span class="option-label">优先级</span>
                    <select id="prioritySelect">
                        <option value="high">高</option>
                        <option value="medium" selected>中</option>
                        <option value="low">低</option>
                    </select>
                </div>
                <div class="option-group">
                    <span class="option-label">时间</span>
                    <select id="timeSelect">
                        <option value="today">今日</option>
                        <option value="week">本周</option>
                        <option value="long">长期</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- 标签筛选 -->
        <div class="tabs">
            <button class="tab active" data-filter="all">全部</button>
            <button class="tab" data-filter="life">生活</button>
            <button class="tab" data-filter="work">工作</button>
            <button class="tab" data-filter="study">学习</button>
        </div>
        
        <!-- TODO列表 -->
        <ul class="todo-list" id="todoList"></ul>
        
        <!-- 导出操作 -->
        <div class="actions">
            <button class="btn btn-secondary" onclick="exportData()">导出</button>
            <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">导入</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        </div>
        
        <div class="shortcuts">
            <kbd class="kbd">Enter</kbd> 添加 &nbsp; <kbd class="kbd">Esc</kbd> 清空
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'daily-todos-v2';
        const STREAK_KEY = 'todo-streak';
        let currentFilter = 'all';
        
        // 显示日期
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });
        
        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }
        
        function getTodos() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : { today: [], week: [], long: [] };
        }
        
        function saveTodos(todos) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
            updateStreak();
        }
        
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;
            
            const category = document.getElementById('categorySelect').value;
            const priority = document.getElementById('prioritySelect').value;
            const timeType = document.getElementById('timeSelect').value;
            
            const todos = getTodos();
            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false,
                category: category,
                priority: priority,
                createdAt: new Date().toISOString()
            };
            
            if (timeType === 'today') todos.today.push(newTodo);
            else if (timeType === 'week') todos.week.push(newTodo);
            else todos.long.push(newTodo);
            
            saveTodos(todos);
            input.value = '';
            render();
        }
        
        function deleteTodo(timeType, id) {
            const todos = getTodos();
            const list = todos[timeType];
            const index = list.findIndex(t => t.id === id);
            if (index > -1) {
                list.splice(index, 1);
                saveTodos(todos);
                render();
            }
        }
        
        function editTodo(timeType, id) {
            const todos = getTodos();
            const todo = todos[timeType].find(t => t.id === id);
            if (!todo) return;
            
            const textDiv = document.getElementById(`text-${id}`);
            const currentText = todo.text;
            
            textDiv.innerHTML = `<input type="text" class="edit-input" value="${escapeHtml(currentText)}" id="input-${id}" onkeypress="handleEditKey(event, '${timeType}', ${id})" onblur="saveEdit('${timeType}', ${id})">`;
            
            const input = document.getElementById(`input-${id}`);
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
        }
        
        function handleEditKey(event, timeType, id) {
            if (event.key === 'Enter') {
                saveEdit(timeType, id);
            } else if (event.key === 'Escape') {
                render();
            }
        }
        
        function saveEdit(timeType, id) {
            const input = document.getElementById(`input-${id}`);
            if (!input) return;
            
            const newText = input.value.trim();
            if (newText) {
                const todos = getTodos();
                const todo = todos[timeType].find(t => t.id === id);
                if (todo) {
                    todo.text = newText;
                    saveTodos(todos);
                }
            }
            render();
        }
        
        function toggleTodo(timeType, id) {
            const todos = getTodos();
            const todo = todos[timeType].find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos(todos);
                render();
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') addTodo();
            else if (event.key === 'Escape') document.getElementById('todoInput').value = '';
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            render();
        }
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => setFilter(tab.dataset.filter));
        });
        
        function render() {
            const todoList = document.getElementById('todoList');
            const todos = getTodos();
            
            const timeGroups = [
                { key: 'today', name: '今日' },
                { key: 'week', name: '本周' },
                { key: 'long', name: '长期' }
            ];
            
            let html = '';
            let total = 0, completed = 0;
            
            timeGroups.forEach(group => {
                let filtered = todos[group.key];
                if (currentFilter !== 'all') {
                    filtered = filtered.filter(t => t.category === currentFilter);
                }
                
                if (filtered.length > 0) {
                    html += `<div class="todo-group"><div class="group-title">${group.name}</div>`;
                    
                    filtered.forEach(todo => {
                        total++;
                        if (todo.completed) completed++;
                        
                        html += `
                            <li class="todo-item ${todo.completed ? 'completed' : ''}">
                                <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo('${group.key}', ${todo.id})">
                                <div class="todo-content">
                                    <div class="todo-text" id="text-${todo.id}">${escapeHtml(todo.text)}</div>
                                    <div class="todo-meta">
                                        <span class="tag ${todo.category}">${todo.category === 'life' ? '生活' : todo.category === 'work' ? '工作' : '学习'}</span>
                                        <span class="priority-badge ${todo.priority}">${todo.priority === 'high' ? '高' : todo.priority === 'medium' ? '中' : '低'}</span>
                                    </div>
                                </div>
                                <button class="edit-btn" onclick="editTodo('${group.key}', ${todo.id})">编辑</button>
                                <button class="delete-btn" onclick="deleteTodo('${group.key}', ${todo.id})">删除</button>
                            </li>
                        `;
                    });
                    
                    html += '</div>';
                }
            });
            
            if (!html) {
                html = '<div class="empty-state">没有任务，放松一下吧~ 🎉</div>';
            }
            
            todoList.innerHTML = html;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('completionRate').textContent = total ? Math.round(completed / total * 100) + '%' : '0%';
            document.getElementById('streakDays').textContent = getStreak();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function updateStreak() {
            const today = getTodayKey();
            const streakData = JSON.parse(localStorage.getItem(STREAK_KEY) || '[]');
            const lastDate = streakData[streakData.length - 1];
            
            if (lastDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];
                
                if (lastDate === yesterdayStr || !lastDate) {
                    streakData.push(today);
                } else if (lastDate !== today) {
                    streakData.length = 0;
                    streakData.push(today);
                }
            }
            
            localStorage.setItem(STREAK_KEY, JSON.stringify(streakData.slice(-30)));
        }
        
        function getStreak() {
            const streakData = JSON.parse(localStorage.getItem(STREAK_KEY) || '[]');
            let streak = 0;
            const today = new Date();
            
            for (let i = streakData.length - 1; i >= 0; i--) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() - (streakData.length - 1 - i));
                if (checkDate.toISOString().split('T')[0] === streakData[i]) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }
        
        function exportData() {
            const data = {
                todos: getTodos(),
                streak: localStorage.getItem(STREAK_KEY),
                exportTime: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `todo-backup-${getTodayKey()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.todos) localStorage.setItem(STORAGE_KEY, JSON.stringify(data.todos));
                    if (data.streak) localStorage.setItem(STREAK_KEY, data.streak);
                    render();
                    alert('✅ 导入成功！');
                } catch (err) {
                    alert('❌ 导入失败');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        render();
    </script>
</body>
</html>
